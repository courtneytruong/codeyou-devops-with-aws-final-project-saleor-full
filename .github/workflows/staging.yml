name: Staging

on:
  push:
    branches: [staging]

jobs:
  compose-validation:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for services to become healthy
        run: |
          services="api dashboard db redis"
          for i in $(seq 1 30); do
            unhealthy=0
            for s in $services; do
              cid=$(docker compose ps -q "$s")
              status=$(docker inspect --format='{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "none")
              echo "$s: $status"
              if [ "$status" != "healthy" ]; then
                unhealthy=1
              fi
            done
            if [ "$unhealthy" -eq 0 ]; then
              echo "All services are healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Services failed to become healthy in time"
          docker compose logs
          exit 1

      - name: Tear down the stack
        if: always()
        run: docker compose down -v

  build-and-push:
    name: Build and Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: compose-validation
    strategy:
      matrix:
        include:
          - image: saleor-api
            context: ./saleor-api
          - image: saleor-dashboard
            context: ./saleor-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ matrix.image }}:staging ${{ matrix.context }}

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to DockerHub
        run: |
          docker tag ${{ matrix.image }}:staging ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:staging
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:staging
